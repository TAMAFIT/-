<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>たまフィット - システム診断</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { background-color: #1e1e1e; color: #00ff00; font-family: monospace; padding: 20px; font-size: 14px; line-height: 1.6; }
    h3 { color: #fff; border-bottom: 1px solid #555; padding-bottom: 10px; }
    .log { margin-bottom: 5px; border-left: 3px solid #00ff00; padding-left: 10px; }
    .error { color: #ff5555; border-left: 3px solid #ff5555; font-weight: bold; background: #331111; padding: 10px; margin-top: 10px; }
    .success { color: #00aaff; border-left: 3px solid #00aaff; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>
  <h3>システム診断モード</h3>
  <div id="console"></div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwk--BBlH7rg_VF9WDfqlvcmloBydipwdK60CVEk1fvPunvSTvR5IkbMxNbyHhmSDuS/exec";
    const LIFF_ID = "2009803249-QQEbOzvg";
    const con = document.getElementById('console');

    function printLog(msg, type="log") {
      con.innerHTML += `<div class="${type}">${msg}</div>`;
    }

    async function run() {
      try {
        printLog("1. LINE連携システムを起動中...");
        await liff.init({ liffId: LIFF_ID });
        printLog(" -> 初期化成功");

        if (!liff.isLoggedIn()) {
           printLog(" -> ⚠️ 未ログイン。LINEログイン画面へ移動します...", "error");
           liff.login();
           return;
        }

        printLog("2. お客様のLINE情報を取得中...");
        const profile = await liff.getProfile();
        printLog(` -> 取得成功 (ID: ${profile.userId.substring(0,8)}...)`);

        printLog("3. たまフィット名簿(GAS)へ通信開始...");
        const res = await fetch(`${GAS_URL}?action=getMember&lineId=${profile.userId}`);
        printLog(` -> 通信完了 (HTTPステータス: ${res.status})`);

        printLog("4. GASからの返信データを読み込み中...");
        const text = await res.text();
        printLog(` -> 読み込み完了 (文字数: ${text.length})`);
        
        if (!res.ok) {
            printLog(` -> サーバーエラー返答: ${text.substring(0, 100)}`, "error");
            return;
        }

        printLog("5. データを解析中...");
        try {
          const result = JSON.parse(text);
          printLog(" -> 解析成功！", "success");
          printLog(`結果: ${result.success ? "既存会員データを発見" : "新規お客様と判定"}`);
          printLog("★システムは正常に動いています。元のHTMLに戻してください。", "success");
        } catch (e) {
          printLog("❌ 解析エラー！GASがデータを正しく返していません。", "error");
          printLog(`原因: ${e.message}`, "error");
          printLog(`GASの返答内容: ${text.substring(0, 150)}...`, "error");
        }
      } catch (err) {
        printLog(`❌ 致命的なエラー発生: ${err.message}`, "error");
      }
    }
    
    // 画面ロード時に自動実行
    run();
  </script>
</body>
</html>
